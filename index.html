
<!DOCTYPE html>
<html>
<head>
    <title>Certificate Validation</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f2f2f2;
        }
        h1 {
            color: #333;
        }
        input, button {
            padding: 10px;
            margin: 10px;
        }
        button {
            background: blue;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<h1>Certificate Validation System</h1>

<h2>Issue Certificate</h2>
<input type="text" id="name" placeholder="Student Name">
<input type="text" id="course" placeholder="Course">
<button onclick="issueCert()">Issue</button>

<h2>Verify Certificate</h2>
<input type="text" id="certId" placeholder="Certificate ID">
<button onclick="verifyCert()">Verify</button>

<p id="result"></p>

<script>
function issueCert() {
    alert("Certificate Issued (Demo)");
}

function verifyCert() {
    let id = document.getElementById("certId").value;
    if(id === "123") {
        document.getElementById("result").innerText = "Valid Certificate";
    } else {
        document.getElementById("result").innerText = "Not Found";
    }
}
</script>

</body>
</html>
